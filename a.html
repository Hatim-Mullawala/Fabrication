<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Fabrication Manager</title>
    <style>
    :root { --primary-gold: #b38728; --navy: #1e293b; --bg-light: #f4f7f6; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-light); margin: 0; padding: 20px; }

    /* --- Top Search Bar --- */
    .top-search-container { text-align: center; margin-bottom: 25px; }
    .top-search-container input { 
        width: 100%; max-width: 600px; padding: 12px 20px; 
        border: 1px solid var(--primary-gold); border-radius: 25px; 
        font-size: 14px; outline: none; color: #555;
    }

    /* --- Main White Wrapper --- */
    .main-wrapper { 
        max-width: 1200px; margin: 0 auto; background: #fff; 
        padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); 
    }

    /* --- Header Area --- */
    .header-container { 
        display: flex; justify-content: space-between; align-items: center; 
        border-bottom: 2px solid var(--primary-gold); padding-bottom: 20px; margin-bottom: 20px; 
    }
    .header-left { display: flex; align-items: center; gap: 15px; }
    .header-logo { width: 50px; height: 50px; object-fit: contain; }
    .header-text h1 { color: var(--primary-gold); font-size: 22px; font-weight: 900; margin: 0; letter-spacing: 1px; }
    .header-text p { color: #64748b; font-size: 13px; font-weight: 700; margin: 4px 0 0 0; }
    .refresh-btn { cursor: pointer; color: var(--primary-gold); font-size: 20px; background: none; border: none; transition: 0.3s; }
    .refresh-btn:hover { transform: rotate(180deg); }

    /* --- Category Header --- */
    .category-header { 
        background: #262626; color: white; padding: 12px 20px; 
        font-size: 15px; font-weight: 800; text-transform: uppercase; 
        border-left: 5px solid var(--primary-gold); margin-top: 30px; margin-bottom: 20px; border-radius: 4px; 
    }

    /* --- Perfect Grid & Card --- */
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 20px; }
    
    .product-card { 
        border: 1px solid #f0f0f0; border-radius: 8px; padding: 12px; 
        display: flex; flex-direction: column; align-items: center; 
        position: relative; transition: 0.3s; background: #fff; 
    }
    .product-card:hover { box-shadow: 0 5px 15px rgba(0,0,0,0.06); }

    /* Square Pink Trash Button */
    .btn-trash { 
        position: absolute; top: 12px; right: 12px; 
        background: #fce8e8; color: #d9534f; border: none; 
        width: 26px; height: 26px; border-radius: 4px; 
        font-size: 14px; cursor: pointer; display: flex; justify-content: center; align-items: center; z-index: 10;
    }

    .img-wrapper { 
        background: #fbfbfb; width: 100%; height: 160px; 
        display: flex; justify-content: center; align-items: center; 
        border-radius: 8px; margin-bottom: 15px; 
    }
    .img-wrapper img { max-width: 85%; max-height: 120px; object-fit: contain; }

    .brand-text { color: var(--primary-gold); font-size: 11px; font-weight: 900; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 0.5px; }
    .product-title { color: var(--navy); font-size: 15px; font-weight: 800; margin-bottom: 15px; text-align: center; }

    .btn-edit { 
        background: #b8860b; color: white; border: none; width: 100%; 
        padding: 12px; border-radius: 6px; font-size: 12px; font-weight: 800; 
        cursor: pointer; margin-top: auto; text-transform: uppercase;
    }

    /* --- Floating Action Buttons (Right Corner) --- */
    .fab-container { position: fixed; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 15px; align-items: flex-end; z-index: 1000; }
    .btn-logout { background: #262626; color: white; border: none; padding: 10px 20px; border-radius: 25px; font-size: 12px; font-weight: bold; cursor: pointer; letter-spacing: 1px; }
    .btn-add { background: #1e1e1e; color: white; border: none; width: 55px; height: 55px; border-radius: 50%; font-size: 30px; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
</style>
</head>
<body>

    <!-- Top Centered Search Bar -->
    <div class="top-search-container">
        <input type="text" id="searchInput" placeholder="Search Inventory (Name, Brand, Tags...)" onkeyup="filterManagerProducts()">
    </div>

    <!-- Main Content Wrapper -->
    <div class="main-wrapper">
        
        <!-- Header area exactly like screenshot -->
        <div class="header-container">
            <div class="header-left">
                <!-- Replace with your actual logo link if needed -->
                <img src="https://placehold.co/100x100/f8fafc/b38728?text=LOGO" alt="Logo" class="header-logo">
                <div class="header-text">
                    <h1>HATIMI HARDWARE</h1>
                    <p>Fabrication Inventory Control Panel</p>
                </div>
            </div>
            <!-- Refresh Button -->
            <button class="refresh-btn" onclick="location.reload()" title="Refresh Data">↻</button>
        </div>

        <!-- The area where Javascript will draw the grid -->
        <div id="catalog-container"></div>
        
    </div>

    <!-- The Floating Buttons -->
    <div class="fab-container">
        <button class="btn-logout" onclick="window.location.href='index.html'">LOGOUT</button>
        <button class="btn-add" onclick="openInputModal()">+</button>
    </div>

    <!-- (Keep your existing Input Modal code here) -->
    <div id="inputModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); align-items:center; justify-content:center; z-index: 2000;">
    <div style="background: white; width: 90%; max-width: 500px; padding: 25px; border-radius: 12px; position:relative;">
        <h2 id="modalAction" style="color:#b38728;">Add Product</h2>
        
        <form id="productForm" action="https://script.google.com/macros/s/AKfycbzPFvVZrvjAPMIqx_KI8ddAh3tr4EvWGYsRzls2YtbFKjhKCJGBULXAc2vYQ6kgwLQU/exec">
            
            <input type="hidden" id="rowId" name="rowId" value="-1">
            <input type="hidden" id="specs" name="specs" value="">

            <div class="form-group"><input type="text" id="cat" name="cat" placeholder="Category" required></div>
            <div class="form-group"><input type="text" id="brand" name="brand" placeholder="Brand" required></div>
            <div class="form-group"><input type="text" id="name" name="name" placeholder="Product Name" required></div>
            <div class="form-group"><input type="text" id="mrp" name="mrp" placeholder="MRP" required></div>
            
            <button type="submit" class="btn-edit" style="width:100%; margin-top:15px;">SAVE PRODUCT</button>
            <button type="button" onclick="closeModal()" style="width:100%; margin-top:10px; border:none; background:none; color:red; cursor:pointer;">CANCEL</button>
        </form>
    </div>
</div>
    <script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRqfLPTM9QCajpUToFw0B2UTKUIv-0d3P5ldQxLWKYfD98PPVf5ZEDXITZuTrdNPh8D8dDKcJxO1D4O/pub?gid=789817243&single=true&output=csv'; // Ensure this is your link!
    let allProducts = [];

    // 1. Fetch and Load
    async function loadData() {
        try {
            const resp = await fetch(SHEET_URL + '&nocache=' + new Date().getTime());
            const data = await resp.text();
            const rows = data.split('\n').slice(1);
            allProducts = rows.map(row => {
                const c = row.split(','); // Simplified for manager, use parseCSVLine if needed
                return { cat: c[0], brand: c[1], name: c[2], mrp: c[5] };
            });
            renderManagerGrid();
        } catch (e) { console.error("Load Failed:", e); }
    }
function renderManagerGrid() {
    const container = document.getElementById('catalog-container');
    if (!container) return;

    let html = "";
    let currentCat = "";

    // Sort by Category, then Name
    const sortedProducts = [...allProducts].sort((a, b) => {
        const catA = String(a.cat || "").trim().toLowerCase();
        const catB = String(b.cat || "").trim().toLowerCase();
        if (catA !== catB) return catA.localeCompare(catB);
        const nameA = String(a.name || "").trim().toLowerCase();
        const nameB = String(b.name || "").trim().toLowerCase();
        return nameA.localeCompare(nameB);
    });

    sortedProducts.forEach((p) => {
        const catName = String(p.cat || "").trim();
        
        // Build the Dark Category Header
        if (catName !== currentCat) {
            if (html !== "") html += `</div>`; // Close previous grid
            currentCat = catName;
            html += `<div class="category-header">${currentCat}</div>
                     <div class="product-grid">`; 
        }

        const nClean = String(p.name).toLowerCase().trim().replace(/[,\s./_]+/g, '-');
        const bClean = String(p.brand).toLowerCase().trim().replace(/[,\s./_]+/g, '-');
        const cClean = String(p.cat).toLowerCase().trim().replace(/[,\s./_]+/g, '-');
        const imgId = `mgr-img-${Math.random().toString(36).substr(2, 5)}`;
        
        const paths = [
            `fabrication-img/${bClean}-${nClean}.jpg`, 
            `fabrication-img/${cClean}-${nClean}.jpg`, 
            `fabrication-img/${nClean}.jpg`
        ];

        const originalIndex = allProducts.indexOf(p);

        // Build the card exactly like the screenshot
        html += `
        <div class="product-card" data-search="${p.name.toLowerCase()} ${p.brand.toLowerCase()}">
            <!-- Pink Square Trash Icon -->
            <button class="btn-trash" onclick="deleteProduct(${originalIndex})" title="Delete">🗑️</button>
            
            <div class="img-wrapper">
                <img id="${imgId}" src="https://placehold.co/300x300/fbfbfb/b38728?text=Loading...">
            </div>
            
            <div class="brand-text">${p.brand}</div>
            <div class="product-title">${p.name}</div>
            
            <!-- Solid Gold Edit Button -->
            <button class="btn-edit" onclick="openInputModal(${originalIndex})">EDIT / VIEW</button>
        </div>`;

        setTimeout(() => { if(typeof tryLoadImage === 'function') tryLoadImage(imgId, paths, p.name); }, 20);
    });

    if (html !== "") html += "</div>"; 
    container.innerHTML = html;
}

// Add this quick function to make your new Search Bar work!
function filterManagerProducts() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    document.querySelectorAll('.product-card').forEach(card => {
        const text = card.getAttribute('data-search');
        card.style.display = text.includes(q) ? "flex" : "none";
    });
}
let editingIndex = -1; 

function openInputModal(index = -1) {
    editingIndex = index; 

    if (index >= 0) {
        // --- VIEW / EDIT TABLE MODE ---
        const p = allProducts[index];
        
        document.getElementById('viewModalTitle').innerText = p.name;
        document.getElementById('viewModalCat').innerText = p.cat;
        
        // Initial render: show all rows in "View" mode (-1 means no row is being edited)
        renderViewModalTable(index, -1);
        document.getElementById('viewModal').style.display = "flex";
        
    } else {
        // --- ADD MODE (Clicked the + button) ---
        const modal = document.getElementById('inputModal');
        document.getElementById('modalAction').innerText = "Add Product";
        
        if (document.getElementById('cat')) document.getElementById('cat').value = "";
        if (document.getElementById('brand')) document.getElementById('brand').value = "";
        if (document.getElementById('name')) document.getElementById('name').value = "";
        if (document.getElementById('mrp')) document.getElementById('mrp').value = "";
        
        modal.style.display = "flex";
    }
}

// --- NEW FUNCTION: Redraws the table and handles the inline edit state ---
function renderViewModalTable(productIndex, editRowIdx = -1) {
    const p = allProducts[productIndex];
    
    let specsArray = [];
    if (!p.specs || p.specs.trim() === "") {
        specsArray = [p.name]; 
    } else {
        specsArray = String(p.specs).split(/[,，|]+/);
    }
    
    const pricesArray = String(p.mrp || "0").split(/[,，|]+/);
    let rowsHtml = "";
    
    specsArray.forEach((fullSpec, idx) => {
        const cleanSpec = fullSpec.trim();
        if (!cleanSpec) return;
        
        const price = parseFloat(pricesArray[idx] ? pricesArray[idx].trim().replace(/[₹\s,]/g,'') : (pricesArray[0] ? pricesArray[0].trim().replace(/[₹\s,]/g,'') : "0")) || 0;
        
        if (idx === editRowIdx) {
            // ✏️ EDIT MODE ROW (Input boxes with Gold/Green borders)
            rowsHtml += `
            <tr>
                <td style="padding:16px 5px; border-bottom:1px solid #f1f5f9; font-size:11px; font-weight:900; color:#b38728; text-transform:uppercase; letter-spacing:0.5px;">${p.brand}</td>
                
                <td style="padding:16px 5px; border-bottom:1px solid #f1f5f9;">
                    <input type="text" id="editSpec_${idx}" value="${cleanSpec}" style="width: 90%; padding: 8px; border: 2px solid #b38728; border-radius: 4px; font-size: 14px; font-weight: 800; color: #1e293b; outline: none;">
                </td>
                
                <td style="padding:16px 5px; border-bottom:1px solid #f1f5f9;">
                    <div style="display: flex; align-items: center;">
                        <span style="color: #b38728; font-weight: 800; margin-right: 4px;">₹</span>
                        <input type="number" id="editPrice_${idx}" value="${price}" style="width: 80px; padding: 8px; border: 2px solid #10b981; border-radius: 4px; font-size: 14px; font-weight: 800; color: #1e293b; outline: none;">
                    </div>
                </td>
                
                <td style="padding:16px 5px; border-bottom:1px solid #f1f5f9; text-align:right; white-space:nowrap;">
                    <button onclick="saveInlineVariant(${productIndex}, ${idx})" style="background: #10b981; color: white; border: none; padding: 6px 12px; border-radius: 4px; font-weight: 800; font-size: 11px; cursor: pointer; margin-right: 5px;">SAVE</button>
                    <button onclick="renderViewModalTable(${productIndex}, -1)" style="background: #94a3b8; color: white; border: none; padding: 6px 12px; border-radius: 4px; font-weight: 800; font-size: 11px; cursor: pointer;">X</button>
                </td>
            </tr>`;
        } else {
            // 👁️ VIEW MODE ROW (Standard text and icons)
            rowsHtml += `
            <tr>
                <td style="padding:16px 5px; border-bottom:1px solid #f1f5f9; font-size:11px; font-weight:900; color:#b38728; text-transform:uppercase; letter-spacing:0.5px;">${p.brand}</td>
                
                <td style="padding:16px 5px; border-bottom:1px solid #f1f5f9; font-size:15px; font-weight:800; color:#1e293b;">${cleanSpec}</td>
                
                <td style="padding:16px 5px; border-bottom:1px solid #f1f5f9; font-size:15px; font-weight:800; color:#b38728;">₹${price}</td>
                
                <td style="padding:16px 5px; border-bottom:1px solid #f1f5f9; text-align:right;">
                    <button onclick="renderViewModalTable(${productIndex}, ${idx})" style="background:none; border:none; cursor:pointer; font-size:18px; margin-right:12px; transition:0.2s;" title="Edit Variant">📝</button>
                    <button onclick="deleteProduct(${productIndex}); closeViewModal();" style="background:none; border:none; cursor:pointer; font-size:18px; transition:0.2s;" title="Delete Entire Product">🗑️</button>
                </td>
            </tr>`;
        }
    });
    
    document.getElementById('viewModalTableBody').innerHTML = rowsHtml;
}

function saveInlineVariant(productIndex, variantIndex) {
    const p = allProducts[productIndex];
    const newSpec = document.getElementById(`editSpec_${variantIndex}`).value;
    const newPrice = document.getElementById(`editPrice_${variantIndex}`).value;
    
    // 1. Get and update the arrays
    let specsArray = (!p.specs || p.specs.trim() === "") ? [p.name] : String(p.specs).split(/[,，|]+/);
    let pricesArray = String(p.mrp || "0").split(/[,，|]+/);
    while (pricesArray.length < specsArray.length) { pricesArray.push(pricesArray[0] || "0"); }
    
    specsArray[variantIndex] = newSpec;
    pricesArray[variantIndex] = newPrice;
    
    p.specs = specsArray.join(", ");
    p.mrp = pricesArray.join(", ");
    
    renderViewModalTable(productIndex, -1);
    
    const titleElement = document.getElementById('viewModalTitle');
    const originalTitle = titleElement.innerText;
    titleElement.innerText = "Saving to Database... ⏳";
    titleElement.style.color = "#10b981"; 

    // ---------------------------------------------------------
    // THE FIX: Target the exact form ID and physically "click" the button
    // ---------------------------------------------------------
    const form = document.getElementById('productForm'); 
    
    if (form) {
        // IMPORTANT: Set the hidden Row ID so Google Script knows what to overwrite!
        if (document.getElementById('rowId')) {
            document.getElementById('rowId').value = productIndex; 
        }
        
        // Fill the fields
        if (document.getElementById('cat')) document.getElementById('cat').value = p.cat || "";
        if (document.getElementById('brand')) document.getElementById('brand').value = p.brand || "";
        if (document.getElementById('name')) document.getElementById('name').value = p.name || "";
        if (document.getElementById('specs')) document.getElementById('specs').value = p.specs; 
        if (document.getElementById('mrp')) document.getElementById('mrp').value = p.mrp;
        
        // Safely trigger the exact submit button
        const submitBtn = form.querySelector('button[type="submit"]');
        if (submitBtn) {
            submitBtn.click(); // This officially fires your Google Script
        } else {
            form.requestSubmit();
        }

        setTimeout(() => {
            titleElement.innerText = originalTitle;
            titleElement.style.color = "#b38728"; 
        }, 2000);
    } else {
        alert("System Error: Could not find id='productForm' in your HTML.");
    }
}

function closeViewModal() {
    document.getElementById('viewModal').style.display = "none";
}
    // START
    loadData();
</script>
<!-- THE NEW VARIANTS TABLE MODAL (Matches Screenshot Exactly) -->
    <div id="viewModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); align-items:center; justify-content:center; z-index: 2500;">
        <div style="background: white; width: 90%; max-width: 650px; padding: 30px; border-radius: 12px; position:relative; max-height: 85vh; overflow-y: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
            
            <!-- Close X -->
            <span onclick="closeViewModal()" style="position:absolute; top:20px; right:20px; font-size:24px; cursor:pointer; color:#94a3b8; font-weight:bold;">&times;</span>
            
            <!-- Product Title & Category -->
            <h2 id="viewModalTitle" style="color:#b38728; margin:0 0 5px 0; font-size:26px; font-weight:900;">Product Name</h2>
            <p id="viewModalCat" style="color:#64748b; font-weight:800; margin:0 0 25px 0; font-size:15px;">Category</p>
            
            <!-- The Data Table -->
            <table style="width:100%; border-collapse: collapse; margin-bottom: 25px;">
                <thead>
                    <tr>
                        <th style="text-align:left; padding:12px 5px; border-bottom:1px solid #cbd5e1; color:#1e293b; font-size:15px; font-weight:800;">Brand</th>
                        <th style="text-align:left; padding:12px 5px; border-bottom:1px solid #cbd5e1; color:#1e293b; font-size:15px; font-weight:800;">Size / Specs</th>
                        <th style="text-align:left; padding:12px 5px; border-bottom:1px solid #cbd5e1; color:#1e293b; font-size:15px; font-weight:800;">MRP (₹)</th>
                        <th style="text-align:right; padding:12px 5px; border-bottom:1px solid #cbd5e1; color:#1e293b; font-size:15px; font-weight:800;">Actions</th>
                    </tr>
                </thead>
                <tbody id="viewModalTableBody">
                    <!-- Javascript will generate the rows here -->
                </tbody>
            </table>
            
            <!-- Close Button -->
            <button onclick="closeViewModal()" style="width:100%; padding:14px; background:#f1f5f9; color:#1e293b; font-weight:800; border:none; border-radius:8px; cursor:pointer; font-size:14px; text-transform:uppercase;">CLOSE WINDOW</button>
        </div>
    </div>
</body>
</html>

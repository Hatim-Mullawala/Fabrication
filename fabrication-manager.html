<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabricataion Manager - Hatimi Hardware</title>
    <style>
        :root { --primary-gold: #b38728; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f7f6; color: #333; }

        .search-container { background: white; padding: 15px 0; display: flex; justify-content: center; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 1000; }
        .search-box { width: 90%; max-width: 700px; padding: 12px 25px; border: 1.5px solid var(--primary-gold); border-radius: 50px; font-size: 16px; outline: none; }

        .main-wrapper { max-width: 1300px; margin: 20px auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 25px rgba(0,0,0,0.06); }
        .catalog-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 3px solid var(--primary-gold); margin-bottom: 20px; }
        .logo-img { height: 80px !important; width: auto; display: block; object-fit: contain; }
        .brand-name { margin: 0; font-size: 28px; font-weight: 800; color: #b38728; text-transform: uppercase; }
        
        .category-header { background: #222; color: #fff; padding: 12px 20px; font-size: 18px; font-weight: 700; text-transform: uppercase; margin-top: 30px; border-left: 8px solid var(--primary-gold); border-radius: 4px; margin-bottom: 15px; }
        
        /* THE PILL BUTTON STYLES */
        .catalog-filters { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-btn { background: white; color: #333; border: 1.5px solid var(--primary-gold); padding: 6px 18px; border-radius: 25px; font-size: 13px; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .filter-btn:hover { background: #fdfaf3; transform: translateY(-2px); }
        .filter-btn.active { background: var(--primary-gold); color: white; box-shadow: 0 4px 10px rgba(179,135,40,0.3); }

        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 0 15px 0; }
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1024px) { .product-grid { grid-template-columns: repeat(5, 1fr); gap: 15px; } }

        .product-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; text-align: center; position: relative; transition: all 0.3s ease; display: flex; flex-direction: column; justify-content: space-between; height: 300px; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.08); border-color: var(--primary-gold); }

        .btn-delete { position: absolute; top: 10px; right: 10px; border: none; background: #fee2e2; padding: 6px; border-radius: 4px; cursor: pointer; z-index: 10; }

        .img-holder { height: 130px; width: 100%; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; background: #fbfbfb; border-radius: 8px; overflow: hidden; }
        .img-holder img { max-height: 110px; max-width: 90%; object-fit: contain; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.05)); }

        .brand-tag { font-size: 11px; letter-spacing: 1px; font-weight: 900; color: #b38728; text-transform: uppercase; margin-top: 5px; }
        .item-name { font-size: 15px; font-weight: 700; color: #1e293b; margin-bottom: 10px; height: 40px; display: flex; align-items: center; justify-content: center; }

        .btn-view { background: var(--primary-gold); color: white; padding: 12px; border-radius: 8px; font-weight: bold; border: none; margin-top: auto; width: 100%; cursor: pointer; text-transform: uppercase; }

        .side-controls { position: fixed; bottom: 30px; right: 20px; display: flex; flex-direction: column; gap: 15px; z-index: 5000; }
        .ctrl-btn { width: 60px; height: 60px; border-radius: 50%; border: none; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-weight: bold; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-logout { background: linear-gradient(135.5deg, #444 0%, #222 100%); color: #fff; border: none; padding: 12px 24px; border-radius: 50px; font-weight: 700; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .btn-add { background: #222; color: white; font-size: 32px; }

        .modal { display: none; position: fixed; z-index: 9999 !important; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; }
        .modal-content { background: white; width: 95%; max-width: 600px; padding: 25px; border-radius: 15px; position: relative; max-height: 85vh; overflow-y: auto; }
        .close-modal { position: absolute; right: 15px; top: 10px; font-size: 30px; cursor: pointer; color: #888; z-index: 10001; }
        
        .modal-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .modal-table td { vertical-align: middle; padding: 12px 8px; }
        .action-icon { cursor: pointer; padding: 5px; border-radius: 4px; display: inline-flex; }
        .edit-icon { color: #b38728; margin-right: 10px; }
        .delete-row-icon { color: #e74c3c; }

        .modal-backdrop { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); z-index: 9998; }
        #addProductModal { display: none; position: fixed; z-index: 9999; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 440px; background: #ffffff; padding: 30px; border-radius: 16px; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 13px; font-weight: 600; color: #64748b; margin-bottom: 6px; }
        .input-group input, .input-group select { width: 100%; padding: 12px 16px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 14px; box-sizing: border-box; }
        
        .confirm-modal { display: none; position: fixed; z-index: 20000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; }
        .confirm-content { background: white; padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; }
        .btn-confirm { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-yes { background: #e74c3c; color: white; }
        .btn-no { background: #eee; color: #333; }
        
        .btn-logout { transition: all 0.3s ease; }
        .btn-logout:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.4); background: linear-gradient(135.5deg, #b38728 0%, #8e6a20 100%); }
        .ctrl-btn { transition: all 0.3s ease; }
        .ctrl-btn:hover { transform: scale(1.1); box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
        .btn-add:hover { background: var(--primary-gold); color: white; transform: scale(1.1) rotate(90deg); }

        .last-sync { text-align: center; font-size: 13px; color: #888; padding: 20px; margin-top: 10px; border-top: 1px solid #eee; }

        @media screen and (max-width: 768px) {
            .main-wrapper { padding: 15px; margin: 10px; }
            .catalog-header { flex-direction: column; text-align: center; }
            .brand-name { font-size: 26px; }
            .search-box { width: 90%; }
            
            .modal-content {
                width: 100% !important; height: 100vh !important; max-height: 100vh !important;
                border-radius: 0 !important; padding: 40px 2px 80px 2px !important; margin: 0 !important;
            }
            .close-modal {
                position: fixed !important; top: 10px !important; right: 15px !important;
                background: #fff; color: #e74c3c !important; width: 35px; height: 35px;
                border-radius: 50%; display: flex; align-items: center; justify-content: center;
                font-size: 28px !important; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 10001;
            }
            .modal-table {
                display: table !important; width: 100% !important; 
                table-layout: fixed !important; border-collapse: collapse;
            }
            .modal-table th, .modal-table td {
                padding: 12px 2px !important; font-size: 11px !important; 
                word-wrap: break-word !important; white-space: normal !important;
            }
            .modal-table th:nth-child(1), .modal-table td:nth-child(1) { width: 25%; }
            .modal-table th:nth-child(2), .modal-table td:nth-child(2) { width: 35%; text-align: left; font-weight: bold; font-size: 12px !important; }
            .modal-table th:nth-child(3), .modal-table td:nth-child(3) { width: 20%; }
            .modal-table th:nth-child(4), .modal-table td:nth-child(4) { width: 20%; text-align: right; }
            .modal-table input[type="text"], .modal-table input[type="number"] { width: 100% !important; font-size: 11px !important; padding: 4px !important; box-sizing: border-box; }
        }
        .icon-btn {
    width: 50px;
    height: 50px;
    border-radius: 50%; /* Makes them circular */
    border: 1px solid #e2e8f0; /* Light gray border */
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);

}
.icon-btn:hover {
    box-shadow: 0 4px 10px rgba(179,135,40,0.2);
    border-color: #b38728;

/* Professional Input Styling */
#modalTableBody input {
    width: 90%;
    padding: 8px 10px;
    border: 1px solid #d1d5db;

#priceModal thead tr {

/* Apply this to both the Header and the Rows */
.price-modal-table {

#priceModal td, #priceModal th {

/* Add this to force alignment */
#modalTableBody tr, #priceModal thead tr {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr 1fr; /* Brand gets more space */
    align-items: center;
}
    </style>
</head>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRqfLPTM9QCajpUToFw0B2UTKUIv-0d3P5ldQxLWKYfD98PPVf5ZEDXITZuTrdNPh8D8dDKcJxO1D4O/pub?gid=789817243&single=true&output=csv';
// !!! GOOGLE APPS SCRIPT URL !!!
// !!! GOOGLE APPS SCRIPT URL !!!
const webAppUrl = 'https://script.google.com/macros/s/AKfycbzY-7qlDdd6F0eAO1bkLU5H7CjMfjw-42FTJKcwRqGiksESI8LJIx9Gds3uUBjuKFbS/exec';

let allProducts = [], uniqueBrands = [], uniqueNames = [];
let deleteTimeout = null, lastDeletedData = null;

function loadManagerData() {
    const container = document.getElementById('catalog-container');
    container.innerHTML = "<div style='text-align:center; padding:50px; font-weight:bold; color:#b38728;'>Opening Fabrication Inventory...</div>";
    const script = document.createElement('script');
    script.src = `${webAppUrl}?callback=handleGoogleResponse&t=${Date.now()}`;
    script.onerror = () => {
        container.innerHTML = "<p style='text-align:center; color:red; padding:50px;'>Connection Error. Please check WebApp URL.</p>";
        document.getElementById('syncStatus').innerHTML = "<span style='color:red;'>🔴 Sync Failed. Check Connection.</span>";
    };
    document.body.appendChild(script);
}

function handleGoogleResponse(response) {
    let rawData = [];
    if (Array.isArray(response)) { rawData = response; } 
    else if (response && response.data) { rawData = response.data; }

    allProducts = rawData.map(entry => {
        const fullRowString = Object.values(entry).join(" ").toLowerCase().replace(/"/g, '');
        return {
            rawSearch: fullRowString,
            cat: String(entry['category'] || "").trim() || "General",
            brand: String(entry['brand'] || "").trim(),
            name: String(entry['product name'] || "").trim(),
            specs: String(entry['specifications'] || "").trim(),
            mrp: String(entry['mrp'] || entry['MRP'] || entry['Mrp'] || entry['mrp '] || entry['MRP '] || "").trim() || "0",
            
            // Added Selling Rate so your Manager Mode columns populate correctly!
            sellingrate: String(entry['selling rate'] || entry['Selling Rate'] || entry['sellingrate'] || "").trim() || "0",
            
            imgUrl: String(entry['image'] || entry['Image'] || entry['IMAGE'] || "").trim(),
            tag: String(entry['tag'] || "").trim(),
            series: String(entry['series'] || "").trim() 
        };
    });
    
    // --- THE NEW SORTING FIX ---
    // This automatically alphabetizes everything by Brand Name (A-Z)
    allProducts.sort((a, b) => String(a.brand).localeCompare(String(b.brand)));
    // ---------------------------

    populateCats(allProducts);
    populateSuggestions(allProducts);
    renderManagerCatalog(allProducts); 
    document.getElementById('syncStatus').innerHTML = `🟢 Live Database Sync: <b>${new Date().toLocaleString()}</b>`;
}
// THE NEW FILTER SYSTEM FOR AUTO-GENERATED TABS
function filterCategoryCards(filterType, btn) {
    const filterContainer = btn.parentElement;
    filterContainer.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const grid = filterContainer.nextElementSibling;
    const cards = grid.querySelectorAll('.product-card');

    cards.forEach(card => {
        const searchText = card.getAttribute('data-search') || "";
        if (filterType === 'All' || searchText.includes(filterType.toLowerCase())) {
            card.style.display = 'flex';
        } else {
            card.style.display = 'none';
        }
    });
}
async function renderManagerCatalog(products) {
    // Add this line inside renderManagerCatalog at the very top:
console.log("First product imgUrl:", products[0]?.imgUrl);
    const container = document.getElementById('catalog-container');
    if (!container) return;

    const searchTerm = document.getElementById('inventory-search')?.value.toLowerCase().replace(/"/g, '') || "";
    const seen = new Set();
    let currentCat = "";
    let html = "";
    const filtered = products.filter(p => p.rawSearch.includes(searchTerm));
    filtered.sort((a, b) => a.cat.localeCompare(b.cat));

    for (const p of filtered) {
        const catName = String(p.cat);
        const key = `${catName}|${p.name}|${p.brand}`;
        
        if (!seen.has(key)) {
            if (catName !== currentCat) {
                if (html !== "") html += `</div></div>`;
                currentCat = catName;
                html += `<div class="category-group" style="margin-bottom: 40px;"><h2 class="category-header">${currentCat}</h2><div class="product-grid">`; 
            }

           // This forces "HT155 " to become "ht155", matching your local file name
const bClean = String(p.brand).toLowerCase().replace(/[^a-z0-9]/g, ''); 
const nClean = String(p.name).toLowerCase().replace(/[^a-z0-9]/g, '');
                        // POINTING TO FABRICATION FOLDER
            // Find the "const paths = ..." line in renderManagerCatalog and replace it with this:
            const paths = p.imgUrl ? [p.imgUrl] : [
    `fabrication-img/${bClean}-${nClean}.jpg`, 
    `fabrication-img/${nClean}.jpg`,
    `fabrication-img/${bClean}.jpg`, // Added: Looks for just the Brand Name (e.g., ht155.jpg)
    
    // Optional but recommended: PNG fallbacks just in case!
    `fabrication-img/${bClean}-${nClean}.png`,
    `fabrication-img/${nClean}.png`,
    `fabrication-img/${bClean}.png`
];
            const imgId = `img-${Math.random().toString(36).substr(2, 5)}`;
            const encN = encodeURIComponent(p.name);
            const encC = encodeURIComponent(catName);
            const encP = encodeURIComponent(p.brand);
            const cardId = `card-${Math.random().toString(36).substr(2, 9)}`;

            html += `
            <div class="product-card" id="${cardId}" data-search="${p.rawSearch}">
                <button onclick="deleteProductGroup('${encN}', '${encC}', '${encP}', false, '${cardId}')" class="btn-delete"><img src="https://cdn-icons-png.flaticon.com/512/1214/1214428.png" style="width:14px;"></button>
                <div class="img-holder"><img id="${imgId}" src="https://placehold.co/150x150/f8fafc/b38728?text=Loading..."></div>
                <div class="card-info">
                    <div class="brand-tag">${p.brand}</div>
                    <div class="item-name">${p.name}</div>
                </div>
                <button class="btn-view" onclick="openModal('${encN}', '${encC}', '${encP}', false)">EDIT / VIEW</button>
            </div>`;

            setTimeout(() => { if(typeof tryLoadImage === 'function') tryLoadImage(imgId, paths); }, 50);
            seen.add(key);
        }
    }
    container.innerHTML = html !== "" ? html + "</div></div>" : "<p>No items found.</p>";
}
function tryLoadImage(idOrElement, urls) {
    const imgElement = typeof idOrElement === 'string' ? document.getElementById(idOrElement) : idOrElement;
    if (!imgElement) return;

    // Check if we have a Google Drive link (starts with http)
    const driveUrl = urls.find(u => u.startsWith('http'));
    
    if (driveUrl) {
        // If it's a Drive link, load it immediately and stop
        imgElement.src = driveUrl;
        imgElement.onerror = () => {
            imgElement.src = 'https://placehold.co/150x150/f8fafc/b38728?text=Error';
        };
        return;
    }

    // If no Drive link, proceed with your existing local file logic
    let expandedUrls = [];
    urls.forEach(u => {
        expandedUrls.push(u);
        if (u.endsWith('.jpg')) expandedUrls.push(u.replace('.jpg', '.png'));
        if (u.endsWith('.png')) expandedUrls.push(u.replace('.png', '.jpg'));
    });

    let index = 0;
    function attemptLoad() {
        if (index < expandedUrls.length) {
            const imgTester = new Image();
            // Important: Use expandedUrls[index] instead of index-1
            imgTester.onload = () => { imgElement.src = expandedUrls[index - 1]; };
            imgTester.onerror = attemptLoad;
            imgTester.src = expandedUrls[index++];
        } else {
            imgElement.src = 'https://placehold.co/150x150/f8fafc/b38728?text=No+Photo';
        }
    }
    attemptLoad();
}

async function saveInLine(rowId, encB, encN, encS) {
    const row = document.getElementById(rowId);
    const actionCell = row.cells[4]; // The last column (Actions)

    // Change button to SYNCING...
    actionCell.innerHTML = `<span style="color:#b38728; font-weight:bold; font-size:11px;">SYNCING...</span>`;

    try {
        // 1. Grab the new values from the inputs
        const newBrand = document.getElementById(`edit-brand-${rowId}`).value;
        const newSize = document.getElementById(`edit-size-${rowId}`).value;
        const newMrp = document.getElementById(`edit-mrp-${rowId}`).value;
        const newRate = document.getElementById(`edit-rate-${rowId}`).value;

        // 2. Send data to Google Apps Script (Fire and Forget)
        fetch(webAppUrl, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "text/plain" },
            body: JSON.stringify({
                action: "updateRow",
                oldBrand: decodeURIComponent(encB),
                name: decodeURIComponent(encN),
                oldSize: decodeURIComponent(encS),
                newBrand: newBrand,
                newSize: newSize,
                newPrice: newMrp,
                newRate: newRate
            })
        });

        // 3. Wait half a second, then Update UI WITHOUT refreshing
        setTimeout(() => {
            // Encode the new data so you can edit it again immediately
            const newEncB = encodeURIComponent(newBrand).replace(/'/g, "%27");
            const newEncS = encodeURIComponent(newSize).replace(/'/g, "%27");

            // A. Update the text on the screen instantly
            row.cells[0].innerHTML = newBrand;
            row.cells[1].innerHTML = newSize;
            row.cells[2].innerHTML = `₹${newMrp}`;
            row.cells[3].innerHTML = `₹${newRate}`;

            // B. Bring back the Edit & Trash Icons (Updating them with the new data)
            actionCell.innerHTML = `
                <div style="display: flex; justify-content: flex-end; gap: 12px; align-items: center;">
                    <span class="action-icon edit-icon" style="cursor:pointer; color:#b38728; transition: 0.2s;" 
                          onclick="makeEditable('${rowId}', '${newEncB}', '${encN}', '${newEncS}', '${newMrp}', '${newRate}')">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                    </span>
                    <span class="action-icon delete-icon" style="cursor:pointer; color:#ef4444; transition: 0.2s;" 
                          onclick="deleteRowSafe('${newEncB}', '${encN}', '${newEncS}', '${rowId}')">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                    </span>
                </div>`;

            // C. Show your Toast message
            if (typeof showToast === "function") {
                showToast("Database Updated", "success");
            }

            // D. QUIET BACKGROUND SYNC (Fixes Manager Mode not showing changes)
            // This pulls the fresh data from the Sheet into memory without reloading the page
            const script = document.createElement('script');
            script.src = `${webAppUrl}?callback=handleGoogleResponse&t=${Date.now()}`;
            document.body.appendChild(script);

        }, 600); // 600ms delay to make the "SYNCING..." text visible briefly

    } catch (error) {
        console.error("Save Error:", error);
        actionCell.innerHTML = `<span style="color:red; font-weight:bold; font-size:11px;">ERROR</span>`;
    }
}

function showUndoToast(message, actionData) {
    if (deleteTimeout) executeFinalDelete();
    lastDeletedData = actionData;
    
    let toast = document.getElementById("undoToast");
    if(!toast) {
        toast = document.createElement('div'); 
        toast.id = "undoToast"; 
        toast.className = `toast-msg`;
        document.body.appendChild(toast);
    }
    
    toast.innerHTML = `<span style="margin-right: 15px;">${message}</span><span class="undo-link" onclick="undoAction()" style="color:#b38728; font-weight:bold; cursor:pointer;">UNDO</span>`;
    toast.style.display = "flex";
    toast.style.background = "#334155";
    toast.style.position = "fixed";
    toast.style.bottom = "80px";
    toast.style.right = "30px";
    toast.style.padding = "16px 24px";
    toast.style.borderRadius = "8px";
    toast.style.color = "white";
    toast.style.zIndex = "9999";
    
    deleteTimeout = setTimeout(() => executeFinalDelete(), 5000);
}

function undoAction() {
    clearTimeout(deleteTimeout); 
    deleteTimeout = null; 
    document.getElementById('undoToast').style.display = "none";
    
    if (lastDeletedData.type === 'full') { 
        const card = document.getElementById(lastDeletedData.cardId);
        if(card) {
            card.style.display = 'flex'; 
            setTimeout(() => { card.style.transform = "scale(1)"; card.style.opacity = "1"; }, 10);
        }
    } else { 
        const row = document.getElementById(lastDeletedData.id); 
        if(row) {
            row.style.display = 'table-row'; 
            setTimeout(() => { row.style.opacity = "1"; }, 10);
        }
    }
    lastDeletedData = null; 
    showToast("Restored successfully!", "success");
}

async function executeFinalDelete() {
    const toast = document.getElementById('undoToast'); 
    if (toast) toast.style.display = "none";
    if (!lastDeletedData) return;
    
    const payload = { 
        action: lastDeletedData.type === 'full' ? "deleteEntireProduct" : "deleteSingleSize", 
        brand: lastDeletedData.brand, 
        name: lastDeletedData.name, 
        size: lastDeletedData.size 
    };
    
    fetch(webAppUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
    showToast("Deleted from Database", "success");
    lastDeletedData = null; 
    deleteTimeout = null;
}

function deleteRowSafe(encB, encN, encS, rowId) {
    const size = decodeURIComponent(encS);
    askBeforeDelete("Remove Size?", `Remove "${size}"?`, () => {
        const row = document.getElementById(rowId); 
        if(row) {
            row.style.opacity = '0';
            setTimeout(() => { row.style.display = 'none'; }, 300);
        }
        showUndoToast("Size removed", { type: 'row', brand: decodeURIComponent(encB), name: decodeURIComponent(encN), size: size, id: rowId });
    });
}

function deleteProductGroup(encN, encC, encP, isAutoHinge, cardId) {
    const prodName = decodeURIComponent(encN);
    const param = decodeURIComponent(encP);
    
    askBeforeDelete("Delete Entire Product?", `This will delete every variant of <b>${prodName}</b>.`, () => {
        const card = document.getElementById(cardId);
        if(card) {
            card.style.transform = "scale(0.9)";
            card.style.opacity = "0";
            setTimeout(() => { card.style.display = 'none'; }, 300); 
        }
        
        const brandForDb = isAutoHinge ? "N/A" : param; 
        showUndoToast("Product group removed", { type: 'full', brand: brandForDb, name: prodName, cardId: cardId });
    });
}

function showToast(message, type = 'success') {
    let toast = document.getElementById("pro-toast");
    if (!toast) {
        toast = document.createElement("div");
        toast.id = "pro-toast";
        toast.style.cssText = `position: fixed; bottom: 30px; right: 30px; padding: 16px 24px; border-radius: 8px; font-weight: bold; color: white; box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 9999; transition: 0.3s; opacity: 0; transform: translateY(20px);`;
        document.body.appendChild(toast);
    }
    toast.style.background = type === 'error' ? "#ef4444" : "#10b981";
    toast.innerHTML = message;
    
    setTimeout(() => { toast.style.opacity = "1"; toast.style.transform = "translateY(0)"; }, 10);
    setTimeout(() => { toast.style.opacity = "0"; toast.style.transform = "translateY(20px)"; }, 2500);
}

function populateCats(products) {
    const catSelect = document.getElementById('newCat'); 
    if (!catSelect) return;
    const categories = [...new Set(products.map(p => p.cat))].filter(c => c).sort();
    catSelect.innerHTML = '<option value="">Select Category</option>' + categories.map(c => `<option value="${c}">${c}</option>`).join('') + '<option value="ADD_NEW" style="color:#d4af37; font-weight:bold;">+ Add New Category</option>';
    catSelect.onchange = function() {
        if (this.value === "ADD_NEW") { const nCat = prompt("New Category Name:"); if (nCat) { const opt = document.createElement('option'); opt.value = nCat; opt.text = nCat; this.add(opt, this.options[this.length - 1]); this.value = nCat; } else this.value = ""; }
    };
}

function populateSuggestions(products) {
    uniqueBrands = [...new Set(products.map(p => String(p.brand || "").trim()))].filter(b => b && b !== "N/A").sort();
    uniqueNames = [...new Set(products.map(p => String(p.name || "").trim()))].filter(n => n && n !== "Unnamed").sort();
}

function showSuggestions(input, type) {
    const val = input.value.toLowerCase();
    const container = document.getElementById(type === 'brand' ? 'brandSuggestions' : 'nameSuggestions');
    const list = type === 'brand' ? uniqueBrands : uniqueNames;
    
    container.innerHTML = ""; 
    if (!val) { container.style.display = "none"; return; }
    
    const filtered = list.filter(item => item.toLowerCase().includes(val));
    if (filtered.length > 0) {
        container.style.display = "block";
        filtered.forEach(item => { 
            const div = document.createElement('div'); 
            div.className = 'suggestion-item'; 
            div.innerText = item; 
            div.onclick = () => { input.value = item; container.style.display = "none"; }; 
            container.appendChild(div); 
        });
    } else container.style.display = "none";
}

async function handleAddProduct(event) {
    event.preventDefault(); 
    const btn = document.getElementById('submitBtn'); 
    btn.innerText = "SAVING..."; btn.disabled = true;

    try {
        const fileInput = document.getElementById('new-product-file'); 
        let fileData = "", mimeType = "", filename = "";
        
        // Check if an image was selected
        if (fileInput && fileInput.files.length > 0) {
            const file = fileInput.files[0]; 
            const reader = new FileReader();
            
            // Wait for the image to be converted to Base64
            fileData = await new Promise(res => { 
                reader.onload = e => res(e.target.result.split(',')[1]); 
                reader.readAsDataURL(file); 
            });
            mimeType = file.type; 
            filename = file.name;
        }
        
        const payload = { 
            action: fileData ? "addWithImage" : "add", 
            cat: document.getElementById('newCat').value, 
            brand: document.getElementById('newBrand').value || "N/A", 
            name: document.getElementById('newName').value, 
            specs: document.getElementById('newSpecs').value, 
            mrp: document.getElementById('newMrp').value,
            fileData: fileData, 
            mimeType: mimeType, 
            filename: filename 
        };
        
        await fetch(webAppUrl, { 
            method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, 
            body: JSON.stringify(payload) 
        });
        
        showToast("Product & Image saved!", "success"); 
        document.getElementById('addProductForm').reset(); 
        closeAllModals(); 
        setTimeout(loadManagerData, 2000);
    } catch (error) { 
        showToast("Failed to save product.", "error"); 
    } finally { 
        btn.innerText = "Add to Inventory"; btn.disabled = false; 
    }
}
async function uploadPhotoFromMobile() {
    const fileInput = document.getElementById('mobile-upload');
    const statusText = document.getElementById('upload-status');
    if (!fileInput.files.length) return;
    
    const file = fileInput.files[0];
    const brand = document.getElementById('modalBrand').innerText;
    const name = document.getElementById('modalTitle').innerText;
    
    statusText.style.display = "block";
    statusText.innerText = "Processing...";

    const reader = new FileReader();
    reader.onload = async (e) => {
        const fileData = e.target.result.split(',')[1];
        
        try {
            const response = await fetch(webAppUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                redirect: 'follow',
                body: JSON.stringify({
                    action: "updateImage",
                    brand: brand,
                    name: name,
                    fileData: fileData,
                    mimeType: file.type,
                    filename: `${brand}-${name}.jpg`
                })
            });

            const result = await response.json(); // Wait for the server to talk back
            console.log("Server response:", result);
            
            if (result.result === "success") {
                statusText.innerText = "✅ Upload Successful!";
                showToast("Photo Updated!", "success");
            } else {
                statusText.innerText = "❌ Error: " + result.message;
            }
        } catch (error) {
            console.error("Fetch Error:", error);
            statusText.innerText = "❌ Upload Failed.";
        }
    };
    reader.readAsDataURL(file);
}

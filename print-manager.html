<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manager Print Catalog - Hatimi Hardware</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #fff; color: #000; margin: 0; padding: 20px; }
        
        /* -- NEW: Checkbox Controls Bar -- */
        .print-controls { 
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            margin-bottom: 20px; background: #f8f9fa; padding: 15px;
            border-radius: 8px; border: 1px solid #ddd;
        }
        
        /* Styling the checkbox row to look clean and professional */
        .checkbox-container {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; width: 100%;
        }
        .checkbox-label {
            display: flex; align-items: center; gap: 6px;
            background: #fff; border: 2px solid #1a2942; color: #1a2942;
            padding: 8px 12px; border-radius: 6px; font-size: 14px; font-weight: bold;
            cursor: pointer; transition: 0.2s;
        }
        .checkbox-label:hover { background: #eef2f6; }
        .checkbox-label input { cursor: pointer; width: 16px; height: 16px; }

        .btn-print { background: #b38728; color: white; border: none; padding: 12px 25px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; max-width: 300px;}
        .btn-print:hover { background: #8e6b1f; }

        .paper-header { display: none; }

        .category-divider {
            background-color: #1a2942 !important; color: #ffffff !important; border-bottom: 3px solid #b38728 !important;
            text-align: center; padding: 6px; font-size: 14px; font-weight: 900; text-transform: uppercase;
            letter-spacing: 2px; margin-top: 10px; margin-bottom: 8px; border-radius: 4px;
            -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important;
        }

        /* COMPACT GRID */
        .product-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        
        .product-card { 
            border: 1px solid #ccc; border-radius: 4px; padding: 4px; text-align: center; 
            page-break-inside: avoid; display: flex; flex-direction: column; justify-content: space-between; background: #fafafa;
        }
        
        .date-text { font-size: 8px; color: #777; font-style: italic; margin-bottom: 2px; text-align: left; }
        
        .img-wrapper { width: 100%; height: 75px; display: flex; justify-content: center; align-items: center; margin-bottom: 3px; }
        .img-wrapper img { max-width: 95%; max-height: 70px; object-fit: contain; }
        
        .brand-text { font-size: 9px; font-weight: 900; color: #555; text-transform: uppercase; margin-bottom: 1px; letter-spacing: 0.5px; }
        .product-title { color: #1a2942; font-size: 11px; font-weight: 800; margin-bottom: 3px; line-height: 1.1; }
        
        .price-box { display: flex; flex-direction: column; background: #fff; border: 1px dashed #ccc; padding: 2px; border-radius: 4px; margin-top: auto; }
        .mrp-text { font-size: 10px; color: #e74c3c; text-decoration: line-through; font-weight: bold; }
        .selling-price { font-size: 15px; font-weight: 900; color: #27ae60; margin-top: 1px; }

        /* --- PRINT RULES --- */
        @media print {
            @page { size: A4 portrait; margin: 8mm; } 
            .print-controls { display: none !important; }
            body { padding: 0 !important; width: 100% !important; }

            .paper-header { display: block !important; text-align: center; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 3px solid #b38728 !important; }
            .paper-header h1 { margin: 0; font-size: 20px; font-weight: 900; letter-spacing: 2px; color: #1a2942 !important; text-transform: uppercase; }
            .paper-header p { margin: 2px 0 0 0; font-size: 11px; font-weight: bold; color: #b38728 !important; text-transform: uppercase; }

            .product-grid { width: 100% !important; gap: 4px !important; }
            .product-card { border: 2px solid #1a2942 !important; padding: 3px !important; background: #fff !important; }
            
            .product-title { font-size: 10px !important; color: #1a2942 !important; }
            .selling-price { font-size: 14px !important; color: #27ae60 !important; }

            /* Page Break Logic */
            .force-page-break { page-break-before: always !important; break-before: page !important; }
        }
    </style>
</head>
<body>
    
    <div class="print-controls">
        <div id="category-checkboxes" class="checkbox-container">
            </div>
        <button class="btn-print" onclick="window.print()">🖨️ PRINT SELECTED CATEGORIES</button>
    </div>

    <div class="paper-header">
        <h1>Hatimi Hardware</h1>
        <p>Internal Manager Catalog</p>
    </div>

    <div id="print-container">
        <h2 style="text-align:center; width:100%;">Loading Manager Data...</h2>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRqfLPTM9QCajpUToFw0B2UTKUIv-0d3P5ldQxLWKYfD98PPVf5ZEDXITZuTrdNPh8D8dDKcJxO1D4O/pub?gid=789817243&single=true&output=csv'; 
        
        let allProducts = []; 
        let uniqueCategories = new Set();

        async function loadPrintData() {
            try {
                const resp = await fetch(SHEET_URL + '&nocache=' + new Date().getTime());
                const data = await resp.text();
                const rows = data.split('\n').slice(1);
                
                rows.forEach(row => {
                    const c = row.split(','); 
                    if(c.length < 3) return; 

                    const category = (c[0] || "").trim();
                    const brand = (c[1] || "").trim();
                    const name = (c[2] || "").trim();
                    const mrp = (c[5] || "0").trim();          
                    const sellingPrice = (c[6] || "0").trim(); 
                    const lastUpdated = (c[7] || "N/A").trim();

                    if(category !== "") {
                        uniqueCategories.add(category);
                    }
                    allProducts.push({ category, brand, name, mrp, sellingPrice, lastUpdated });
                });

                // Generate Checkboxes
                const checkboxContainer = document.getElementById('category-checkboxes');
                
                // Add a "Select All" toggle
                let html = `<label class="checkbox-label" style="background:#1a2942; color:white;">
                                <input type="checkbox" id="selectAll" checked onchange="toggleAll(this)"> SELECT ALL
                            </label>`;
                
                // Add individual category checkboxes
                uniqueCategories.forEach(cat => {
                    html += `<label class="checkbox-label">
                                <input type="checkbox" class="cat-checkbox" value="${cat}" checked onchange="renderGrid()"> ${cat}
                             </label>`;
                });
                
                checkboxContainer.innerHTML = html;
                renderGrid();

            } catch (e) {
                document.getElementById('print-container').innerHTML = "<h2 style='text-align:center;'>Error Loading Data</h2>";
            }
        }

        // Magic function to check/uncheck everything at once
        function toggleAll(selectAllBox) {
            const checkboxes = document.querySelectorAll('.cat-checkbox');
            checkboxes.forEach(box => box.checked = selectAllBox.checked);
            renderGrid();
        }

        function renderGrid() {
            // Find out which checkboxes the user has clicked
            const checkedBoxes = document.querySelectorAll('.cat-checkbox:checked');
            const selectedCategories = Array.from(checkedBoxes).map(box => box.value);

            let html = "";
            let printedCategoriesCount = 0;

            if (selectedCategories.length === 0) {
                document.getElementById('print-container').innerHTML = "<h3 style='text-align:center; margin-top:30px;'>Please select at least one category to print.</h3>";
                return;
            }

            // Only loop through the checked categories
            selectedCategories.forEach(cat => {
                let categoryProducts = allProducts.filter(p => p.category === cat);
                
                if (categoryProducts.length > 0) {
                    
                    // Keeps the page breaks between categories!
                    let breakClass = printedCategoriesCount > 0 ? "force-page-break" : "";
                    
                    html += `<div class="${breakClass}">`;
                    html += `<div class="category-divider">${cat}</div>`;
                    html += `<div class="product-grid">`; 

                    categoryProducts.forEach(product => {
                        const nClean = product.name ? product.name.toLowerCase().replace(/[,\s./_]+/g, '-') : '';
                        const bClean = product.brand ? product.brand.toLowerCase().replace(/[,\s./_]+/g, '-') : '';
                        const combo = bClean ? `${bClean}-${nClean}` : nClean;
                        
                        const paths = [ 
                            `fabrication-img/${combo}.jpg`, `fabrication-img/${combo}.JPG`, `fabrication-img/${combo}.png`, 
                            `fabrication-img/${nClean}.jpg`, `fabrication-img/${nClean}.JPG`, `fabrication-img/${nClean}.png`,
                            `fabrication-img/${bClean}.jpg`, `fabrication-img/${bClean}.JPG`, `fabrication-img/${bClean}.png`
                        ];
                        const imgId = `img-mgr-${Math.random().toString(36).substr(2, 5)}`;

                        html += `
                        <div class="product-card">
                            <div class="date-text">Upd: ${product.lastUpdated}</div>
                            <div class="img-wrapper"><img id="${imgId}" src="https://placehold.co/150x150/fbfbfb/1a2942?text=Loading"></div>
                            
                            <div class="brand-text">${product.brand}</div>
                            <div class="product-title">${product.name}</div>
                            
                            <div class="price-box">
                                <span class="mrp-text">MRP ₹${product.mrp}</span>
                                <span class="selling-price">₹${product.sellingPrice}</span>
                            </div>
                        </div>`;

                        setTimeout(() => tryLoadImage(imgId, paths), 20);
                    });

                    html += `</div></div>`; 
                    printedCategoriesCount++;
                }
            });

            document.getElementById('print-container').innerHTML = html;
        }

        function tryLoadImage(imgId, paths, index = 0) {
            const el = document.getElementById(imgId);
            if (!el) return; 
            if (index >= paths.length) { el.src = 'https://placehold.co/150x150/fbfbfb/cccccc?text=No+Image'; return; }
            const img = new Image();
            img.onload = () => el.src = paths[index];
            img.onerror = () => tryLoadImage(imgId, paths, index + 1);
            img.src = paths[index];
        }

        loadPrintData();
    </script>
</body>
</html>
